<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contract Intelligence</title>
    <script>
      // FOUC prevention: applies the persisted theme (or default 'dark')
      // before React mounts. Keep in sync with src/theme.ts.
      (function () {
        try {
          var t = localStorage.getItem("contracts.theme");
          if (t !== "light") document.documentElement.classList.add("dark");
        } catch (e) {
          document.documentElement.classList.add("dark");
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
